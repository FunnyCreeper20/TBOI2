<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Binding of Isaac</title>
    <style>
        /* Removes all margins and centers the game perfectly */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Black background for immersion */
            overflow: hidden;
        }

        /* The game container wraps the player */
        #ruffle-container {
            width: 100%;
            height: 100%;
            max-width: 1000px; /* Original game width */
            max-height: 572px;  /* Original game height */
            display: flex;
        }

        #ruffle-container player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);
            
            player.load({
                url: "https://trapjawws.github.io/josh/The%20Binding%20of%20Isaac.swf",
                // This helps the game capture keyboard input immediately
                allowScriptAccess: true,
                letterbox: "on"
            });

            // Auto-focus the player so keys work instantly
            player.focus();
        });
    </script>
</body>
</html>
