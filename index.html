<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Binding of Isaac - Lite</title>
    <link rel="stylesheet" type="text/css" href="https://tboi.com/assets/main.css">
    
    <style>
        /* This centers everything on the page and removes scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers vertically */
            align-items: center;     /* Centers horizontally */
            background-color: #111;  /* Dark background */
            overflow: hidden;        /* Prevents accidental scrolling */
        }

        #gameParent {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
        }

        /* The game container */
        #ruffle-container {
            width: 100%;
            aspect-ratio: 1000 / 572;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Mobile Controls Styling */
        .mobile-ui {
            display: none;
            width: 100%;
            justify-content: space-around;
            padding: 20px 0;
        }

        @media (pointer: coarse) {
            .mobile-ui { display: flex; }
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            gap: 10px;
        }

        .ctrl-btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #555;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Open Sans', sans-serif;
            touch-action: none;
            user-select: none;
        }

        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <div id="gameParent">
        <div id="ruffle-container"></div>

        <div class="mobile-ui">
            <div class="d-pad">
                <div></div><button class="ctrl-btn" id="btn-w">W</button><div></div>
                <button class="ctrl-btn" id="btn-a">A</button>
                <button class="ctrl-btn" id="btn-s">S</button>
                <button class="ctrl-btn" id="btn-d">D</button>
            </div>

            <div class="d-pad">
                <div></div><button class="ctrl-btn" id="btn-up">↑</button><div></div>
                <button class="ctrl-btn" id="btn-left">←</button>
                <button class="ctrl-btn" id="btn-down">↓</button>
                <button class="ctrl-btn" id="btn-right">→</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("ruffle-container").appendChild(player);
        
        player.load("https://trapjawws.github.io/josh/The%20Binding%20of%20Isaac.swf");

        // Input Simulation
        function simulateKey(keyCode, keyName, type) {
            const event = new KeyboardEvent(type, {
                key: keyName,
                code: keyName,
                keyCode: keyCode,
                which: keyCode,
                bubbles: true
            });
            window.dispatchEvent(event);
            player.dispatchEvent(event);
        }

        const buttonMap = {
            'btn-w': { code: 87, name: 'w' },
            'btn-a': { code: 65, name: 'a' },
            'btn-s': { code: 83, name: 's' },
            'btn-d': { code: 68, name: 'd' },
            'btn-up': { code: 38, name: 'ArrowUp' },
            'btn-down': { code: 40, name: 'ArrowDown' },
            'btn-left': { code: 37, name: 'ArrowLeft' },
            'btn-right': { code: 39, name: 'ArrowRight' }
        };

        Object.keys(buttonMap).forEach(id => {
            const btn = document.getElementById(id);
            const data = buttonMap[id];

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                simulateKey(data.code, data.name, 'keydown');
            });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                simulateKey(data.code, data.name, 'keyup');
            });
        });
    </script>
</body>
</html>
